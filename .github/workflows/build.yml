name: Build the Blacktip VESC Firmware

permissions:
  contents: write

on:
  push:
    branches:
    - George
  pull_request:
  workflow_dispatch:

env:
  BUILD_TOOLS_DIR: ${{ github.workspace }}/tools

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: get container ready for build
      run: |
        sudo apt-get -y update
        sudo apt-get -y dist-upgrade

    - name: checkout sources
      uses: actions/checkout@v4

    - name: get ARM toolchain version
      id: set_variables
      run: |
        ARM_TOOLCHAIN_VERSION=$(make arm_tools_version)
        echo "arm_toolchain_version=${ARM_TOOLCHAIN_VERSION}" >> $GITHUB_OUTPUT

    - name: load the arm toolchain from cache
      id: cache_toolchain
      uses: actions/cache@v4
      with:
        path: ${{ env.BUILD_TOOLS_DIR }}/
        key: arm_toolchain-${{ steps.set_variables.outputs.arm_toolchain_version }}

    - name: install toolchain
      if: steps.cache_toolchain.outputs.cache-hit != 'true'
      env:
        BUILD_TOOLS_DIR: ${{ env.BUILD_TOOLS_DIR }}
      run: |
        make arm_tools

    - name: generate the version
      id: generate_version
      env:
        PULL_REQUEST_BRANCH: ${{ github.event.pull_request.head.ref }}
        PULL_REQUEST_NUMBER: ${{ github.event.number }}
        PULL_REQUEST_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        VERSION="0.4"
        SHORT_SHA=$(git rev-parse --short HEAD)
        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          SHORT_SHA=$(git rev-parse --short $PULL_REQUEST_SHA)
          NAME="${PULL_REQUEST_NUMBER}-$(echo "${PULL_REQUEST_BRANCH}" | sed 's@/@_@g')"
        else
          NAME="$(date +%Y%m%d)"
        fi
        NAME="${VERSION}-${NAME}-${SHORT_SHA}"
        echo "name=$NAME" >> $GITHUB_OUTPUT

    - name: build the firmware
      env:
        BUILD_TOOLS_DIR: ${{ env.BUILD_TOOLS_DIR }}
      run: |
        make

    - name: PR artifacts
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: blacktip-vesc-${{ steps.generate_version.outputs.name }}
        path: build/BLDC_4_ChibiOS.*

    - name: Push release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/BLDC_4_ChibiOS.*
        generate_release_notes: true
        tag_name: ${{ steps.generate_version.outputs.name }}
